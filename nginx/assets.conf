
server {
    listen 80;
    server_name beyondcode.ae www.beyondcode.ae;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name beyondcode.ae www.beyondcode.ae;

    large_client_header_buffers 4 32k;

    ssl_certificate /etc/letsencrypt/live/beyondcode.ae/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beyondcode.ae/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # SECURITY HEADERS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    add_header X-Frame-Options "" always;

    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # CSP - frontend  Google Maps allowed
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://www.google.com;
        style-src 'self' 'unsafe-inline';
        img-src 'self' https://beyondcode.ae https://*.google.com data:;
        font-src 'self';
        connect-src 'self' beyondcode.ae https://*.google.com;
        frame-src https://www.google.com;
        frame-ancestors 'self';
    " always;

    # END SECURITY HEADERS

    # FRONTEND PROXY
    location / {
        proxy_pass http://frontend:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;
    }
}
